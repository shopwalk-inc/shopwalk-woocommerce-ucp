name: Auto-increment patch version on push to main

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          fetch-depth: 0

      - name: Get current version
        id: current
        run: |
          VERSION=$(grep -m1 "Version:" shopwalk-ai.php | sed "s/.*Version: *//; s/[[:space:]]//g")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Bump patch version
        id: bump
        run: |
          VERSION="${{ steps.current.outputs.version }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumping $VERSION → $NEW_VERSION"

      - name: Update version in plugin files
        run: |
          NEW="${{ steps.bump.outputs.new_version }}"
          sed -i "s/^ \* Version:.*/ * Version:     ${NEW}/" shopwalk-ai.php
          sed -i "s/define( 'SHOPWALK_AI_VERSION', '[^']*' )/define( 'SHOPWALK_AI_VERSION', '${NEW}' )/" shopwalk-ai.php
          sed -i "s/^Stable tag:.*/Stable tag: ${NEW}/" readme.txt

      - name: Commit and push version bump
        run: |
          git config user.email "ci@shopwalk.com"
          git config user.name "Shopwalk CI"
          git add shopwalk-ai.php readme.txt
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push https://x-access-token:${{ secrets.CROSS_REPO_TOKEN }}@github.com/shopwalk-inc/woocommerce-ucp.git HEAD:main

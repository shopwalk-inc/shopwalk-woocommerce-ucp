name: Release plugin zip after version bump

on:
  workflow_run:
    workflows: ["Auto-increment patch version on push to main"]
    types: [completed]
    branches: [main]

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main   # ensure we have the version-bumped commit
          fetch-depth: 0

      - name: Get version
        id: ver
        run: |
          VERSION=$(grep -m1 "^ \* Version:" shopwalk-ai.php | sed "s/.*Version: *//; s/[[:space:]]//g")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Build plugin zip
        run: |
          mkdir -p dist/shopwalk-ai
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='phpcs.xml' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='phpunit.xml' \
            --exclude='tests' \
            --exclude='dist' \
            . dist/shopwalk-ai/
          cd dist && zip -r shopwalk-ai.zip shopwalk-ai/

      - name: Create GitHub Release with zip asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          VERSION="${{ steps.ver.outputs.version }}"
          gh release create "$TAG" dist/shopwalk-ai.zip \
            --title "Shopwalk v${VERSION}" \
            --notes "Auto-release from version bump." \
            --latest
